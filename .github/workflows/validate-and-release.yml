name: Validate & Release

# ──────────────────────────────────────────────────────────────
# Otomatik tetikleyici YOK — sadece elle çalıştırılır.
# Actions → "Run workflow" butonunu kullan.
# ──────────────────────────────────────────────────────────────
on:
  workflow_dispatch:
    inputs:

      # ── Validation toggles ──────────────────────────────────
      run_validate_json:
        description: '🔵 JSON Validation'
        required: true
        type: boolean
        default: true

      run_validate_pack:
        description: '🔵 pack.mcmeta Validation'
        required: true
        type: boolean
        default: true

      run_validate_functions:
        description: '🔵 Function Reference Integrity'
        required: true
        type: boolean
        default: true

      run_validate_structure:
        description: '🔵 File Structure Check'
        required: true
        type: boolean
        default: true

      run_validate_version:
        description: '🔵 Version Validation'
        required: true
        type: boolean
        default: true

      # ── Release config ──────────────────────────────────────
      create_release:
        description: '🚀 GitHub Release oluştur?'
        required: true
        type: boolean
        default: false

      version:
        description: '🏷️  Release version (örn: v1.2.3) — Release için zorunlu'
        required: false
        default: ''

      release_draft:
        description: '📝 Release draft olarak oluştur?'
        required: true
        type: boolean
        default: false

      release_prerelease:
        description: '⚠️  Pre-release olarak işaretle?'
        required: true
        type: boolean
        default: false

      release_generate_notes:
        description: '📋 Release notlarını otomatik oluştur?'
        required: true
        type: boolean
        default: true

      zip_include_overlays:
        description: '📦 ZIP: Overlay klasörlerini dahil et? (_pre_1_21_4, -1_21_4, 1_21_6)'
        required: true
        type: boolean
        default: true

# ──────────────────────────────────────────────────────────────
# JOBS
# ──────────────────────────────────────────────────────────────
jobs:

  # ─────────────────────────────────────────────
  # 1. JSON Validation
  # ─────────────────────────────────────────────
  validate-json:
    name: Validate JSON
    runs-on: ubuntu-latest
    if: ${{ inputs.run_validate_json == true }}
    steps:
      - uses: actions/checkout@v4
      - name: Validate all JSON files
        run: |
          FAILED=0
          while IFS= read -r f; do
            if jq . "$f" > /dev/null 2>&1; then
              echo "OK: $f"
            else
              echo "FAIL: $f"; jq . "$f" 2>&1 || true; FAILED=1
            fi
          done < <(find data _pre_1_21_4 ./-1_21_4 1_21_6 -name "*.json" 2>/dev/null; echo "pack.mcmeta")
          [ $FAILED -ne 0 ] && { echo "FAILED: Invalid JSON files."; exit 1; } || echo "PASSED"

  # ─────────────────────────────────────────────
  # 2. pack.mcmeta Structural Validation
  # ─────────────────────────────────────────────
  validate-pack:
    name: Validate pack.mcmeta
    runs-on: ubuntu-latest
    if: ${{ inputs.run_validate_pack == true }}
    steps:
      - uses: actions/checkout@v4
      - name: Check pack_format and description
        run: |
          FAILED=0
          PF=$(jq '.pack.pack_format // empty' pack.mcmeta)
          [ -n "$PF" ] && echo "OK: pack_format = $PF" || { echo "FAIL: Missing pack_format"; FAILED=1; }
          DESC=$(jq '.pack.description // empty' pack.mcmeta)
          [ -n "$DESC" ] && echo "OK: description present" || { echo "FAIL: Missing description"; FAILED=1; }
          SF=$(jq '.pack.supported_formats // empty' pack.mcmeta)
          [ -n "$SF" ] && echo "OK: supported_formats = $SF" || true
          [ $FAILED -ne 0 ] && exit 1 || echo "PASSED"
      - name: Check overlay directories exist
        run: |
          FAILED=0
          while IFS= read -r dir; do
            [ -z "$dir" ] && continue
            [ -d "$dir" ] && echo "OK: $dir/" || { echo "FAIL: Missing overlay dir: $dir/"; FAILED=1; }
          done < <(jq -r '.overlays.entries[]?.directory // empty' pack.mcmeta 2>/dev/null)
          [ $FAILED -ne 0 ] && exit 1 || echo "PASSED"

  # ─────────────────────────────────────────────
  # 3. Function Reference Integrity
  # ─────────────────────────────────────────────
  validate-functions:
    name: Validate Function References
    runs-on: ubuntu-latest
    if: ${{ inputs.run_validate_functions == true }}
    steps:
      - uses: actions/checkout@v4
      - name: Check function tag references
        run: |
          FAILED=0
          while IFS= read -r tag_file; do
            while IFS= read -r ref; do
              [ -z "$ref" ] && continue
              [[ "$ref" == "#"* ]] && continue
              [[ "$ref" != *:* ]] && continue
              ns="${ref%%:*}"; path="${ref#*:}"
              found=0
              for base in . _pre_1_21_4 ./-1_21_4 1_21_6; do
                [ -f "$base/data/$ns/function/$path.mcfunction" ] && found=1 && break
              done
              [ $found -eq 1 ] && echo "OK: $ref" || { echo "FAIL: $tag_file -> $ref not found"; FAILED=1; }
            done < <(jq -r '.values[]? | if type == "object" then .id else . end' "$tag_file" 2>/dev/null)
          done < <(find data _pre_1_21_4 ./-1_21_4 1_21_6 -path "*/tags/function/*.json" 2>/dev/null)
          [ $FAILED -ne 0 ] && { echo "FAILED"; exit 1; } || echo "PASSED"
      - name: Check for empty .mcfunction files
        run: |
          EMPTY=0
          while IFS= read -r f; do
            content=$(grep -v '^[[:space:]]*#' "$f" | grep -v '^[[:space:]]*$' || true)
            [ -z "$content" ] && { echo "WARN: Empty: $f"; EMPTY=$((EMPTY+1)); }
          done < <(find data _pre_1_21_4 ./-1_21_4 1_21_6 -name "*.mcfunction" 2>/dev/null)
          [ $EMPTY -gt 0 ] && echo "WARN: $EMPTY empty files (may be intentional)" || echo "PASSED"

  # ─────────────────────────────────────────────
  # 4. Required Files Check
  # ─────────────────────────────────────────────
  validate-structure:
    name: Validate File Structure
    runs-on: ubuntu-latest
    if: ${{ inputs.run_validate_structure == true }}
    steps:
      - uses: actions/checkout@v4
      - name: Check required files and directories
        run: |
          FAILED=0
          for f in pack.mcmeta pack.png; do
            [ -f "$f" ] && echo "OK: $f" || { echo "FAIL: $f missing"; FAILED=1; }
          done
          for d in data _pre_1_21_4 ./-1_21_4 1_21_6; do
            [ -d "$d" ] && echo "OK: $d ($(find "$d" -type f | wc -l) files)" || { echo "FAIL: $d missing"; FAILED=1; }
          done
          for fn in \
            "data/macro/function/load.mcfunction" \
            "data/macro/function/tick.mcfunction" \
            "data/minecraft/tags/function/load.json" \
            "data/minecraft/tags/function/tick.json"; do
            [ -f "$fn" ] && echo "OK: $fn" || { echo "FAIL: $fn missing"; FAILED=1; }
          done
          [ $FAILED -ne 0 ] && { echo "FAILED"; exit 1; } || echo "PASSED"

  # ─────────────────────────────────────────────
  # 5. Version Validation
  # ─────────────────────────────────────────────
  validate-version:
    name: Validate Version
    runs-on: ubuntu-latest
    # Bağımlılıklar: sadece aktif olan job'lar beklenir
    needs:
      - validate-json
      - validate-pack
      - validate-functions
      - validate-structure
    if: |
      ${{
        inputs.run_validate_version == true &&
        always() &&
        !contains(needs.*.result, 'failure') &&
        !contains(needs.*.result, 'cancelled')
      }}
    steps:
      - uses: actions/checkout@v4
      - name: Read version from pack.mcmeta
        run: |
          RAW=$(jq -c '.' pack.mcmeta)
          VER=$(echo "$RAW" | grep -oP 'v\d+\.\d+\.\d+' | head -1 || true)
          [ -n "$VER" ] && echo "OK: pack.mcmeta version: $VER" || echo "WARN: No version found in pack.mcmeta"
      - name: Check version matches input
        if: ${{ inputs.version != '' }}
        run: |
          TAG="${{ inputs.version }}"
          TAG="${TAG#v}"
          RAW=$(jq -c '.' pack.mcmeta)
          if echo "$RAW" | grep -qP "v${TAG}"; then
            echo "PASSED: v$TAG matches pack.mcmeta"
          else
            echo "WARN: v$TAG not found in pack.mcmeta — release öncesi pack.mcmeta güncelle"
          fi
      - name: Check CHANGELOG
        run: |
          TAG="${{ inputs.version }}"
          [ ! -f "docs/CHANGELOG.md" ] && { echo "WARN: docs/CHANGELOG.md not found"; exit 0; }
          [ -z "$TAG" ]               && { echo "INFO: Version girilmedi, CHANGELOG kontrolü atlandı"; exit 0; }
          grep -q "$TAG" docs/CHANGELOG.md \
            && echo "OK: $TAG CHANGELOG içinde mevcut" \
            || echo "WARN: $TAG CHANGELOG içinde bulunamadı"

  # ─────────────────────────────────────────────
  # 6. Package & Release
  # ─────────────────────────────────────────────
  release:
    name: Package & Release
    runs-on: ubuntu-latest
    needs:
      - validate-json
      - validate-pack
      - validate-functions
      - validate-structure
    if: |
      ${{
        inputs.create_release == true &&
        always() &&
        !contains(needs.*.result, 'failure') &&
        !contains(needs.*.result, 'cancelled')
      }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Verify version is provided
        run: |
          [ -z "${{ inputs.version }}" ] && { echo "FAIL: Release için version girilmesi zorunlu."; exit 1; }
          echo "OK: Release version = ${{ inputs.version }}"

      - name: Create git tag
        run: |
          TAG="${{ inputs.version }}"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$TAG" || echo "WARN: Tag $TAG zaten var, atlanıyor"
          git push origin "$TAG" || echo "WARN: Tag push edilemedi (zaten mevcut olabilir)"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build datapack ZIP
        id: build
        run: |
          TAG="${{ inputs.version }}"
          ZIP="macroEngine-${TAG}.zip"

          if [ "${{ inputs.zip_include_overlays }}" == "true" ]; then
            zip -r "$ZIP" data/ _pre_1_21_4/ ./-1_21_4/ 1_21_6/ pack.mcmeta pack.png
            echo "OK: Overlay klasörleri ZIP'e dahil edildi"
          else
            zip -r "$ZIP" data/ pack.mcmeta pack.png
            echo "OK: Sadece data/ klasörü ZIP'e dahil edildi"
          fi

          echo "zip_name=$ZIP" >> $GITHUB_OUTPUT
          echo "OK: $ZIP oluşturuldu ($(du -sh "$ZIP" | cut -f1))"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name:             ${{ inputs.version }}
          name:                 "macroEngine ${{ inputs.version }}"
          files:                ${{ steps.build.outputs.zip_name }}
          draft:                ${{ inputs.release_draft }}
          prerelease:           ${{ inputs.release_prerelease }}
          generate_release_notes: ${{ inputs.release_generate_notes }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
